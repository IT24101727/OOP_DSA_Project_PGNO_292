<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Tourism Customization Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/login.html">Login</a></li>
            <li><a href="/register.html">Register</a></li>
            <li><a href="/packages.html">Packages</a></li>
        </ul>
    </nav>
</header>

<div class="section">
    <h2>Traveler Reviews</h2>
    <select id="packageFilter" onchange="loadReviews()">
        <option value="">Select Package to View Reviews</option>
    </select>
    <div id="reviews-container"></div>
    <h3>Submit a Review</h3>
    <form id="review-form" style="display: none;">
        <input type="hidden" id="reviewId">
        <select id="packageId" required>
            <option value="">Select Package</option>
        </select>
        <textarea id="comment" placeholder="Your review" required></textarea>
        <select id="rating" required>
            <option value="1">1 Star</option>
            <option value="2">2 Stars</option>
            <option value="3">3 Stars</option>
            <option value="4">4 Stars</option>
            <option value="5">5 Stars</option>
        </select>
        <select id="reviewType" required>
            <option value="ANONYMOUS">Anonymous</option>
            <option value="VERIFIED">Verified</option>
        </select>
        <button type="submit">Submit Review</button>
    </form>
    <button class="btn" id="toggle-review-form">Add Review</button>
</div>

<footer>
    <p>© 2025 Tourism Customization Platform. All rights reserved.</p>
</footer>

<script>
    async function loadPackagesForReview() {
        try {
            const response = await fetch('/api/packages');
            if (!response.ok) {
                throw new Error('Failed to fetch packages');
            }
            const packages = await response.json();
            const select = document.getElementById('packageId');
            const filterSelect = document.getElementById('packageFilter');
            select.innerHTML = '<option value="">Select Package</option>';
            filterSelect.innerHTML = '<option value="">All Packages</option>';
            packages.forEach(pkg => {
                const option = document.createElement('option');
                option.value = pkg.id;
                option.textContent = pkg.name;
                select.appendChild(option);
                filterSelect.appendChild(option.cloneNode(true));
            });
        } catch (error) {
            console.error('Error loading packages:', error);
            document.getElementById('reviews-container').innerHTML = `<p>Error loading packages: ${error.message}</p>`;
        }
    }

    async function loadReviews() {
        const user = JSON.parse(localStorage.getItem('user'));
        const packageId = document.getElementById('packageFilter').value;
        const container = document.getElementById('reviews-container');

        try {
            let url = '/api/reviews';
            if (packageId) {
                url = `/api/reviews/package/${packageId}`;
            }

            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Failed to fetch reviews: ${response.statusText}`);
            }
            const reviews = await response.json();

            if (reviews.length === 0) {
                container.innerHTML = '<p>No reviews found.</p>';
                return;
            }

            container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Package</th>
                        <th>Comment</th>
                        <th>Rating</th>
                        <th>Type</th>
                        ${user ? '<th>Actions</th>' : ''}
                    </tr>
                </thead>
                <tbody id="reviews-table-body"></tbody>
            </table>
        `;
            const tbody = document.getElementById('reviews-table-body');
            for (const review of reviews) {
                let packageName = 'Unknown Package';
                try {
                    const pkgResponse = await fetch(`/api/packages/${review.packageId}`);
                    if (pkgResponse.ok) {
                        const pkg = await pkgResponse.json();
                        packageName = pkg.name;
                    } else {
                        console.warn(`Package not found for packageId: ${review.packageId}`);
                    }
                } catch (pkgError) {
                    console.warn(`Failed to fetch package ${review.packageId}: ${pkgError.message}`);
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                <td>${packageName}</td>
                <td>${review.comment}</td>
                <td>${review.rating}/5</td>
                <td>${review.reviewType}</td>
                ${user && user.id === review.userId ? `
                    <td>
                        <button class="action-btn edit-btn" onclick="editReview('${review.id}', '${review.packageId}', '${review.comment.replace(/'/g, "\\'")}', ${review.rating}, '${review.reviewType}')">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteReview('${review.id}')">Delete</button>
                    </td>
                ` : ''}
            `;
                tbody.appendChild(row);
            }
        } catch (error) {
            container.innerHTML = `<p>Error loading reviews: ${error.message}</p>`;
            console.error('Error in loadReviews:', error);
        }
    }


    function editReview(id, packageId, comment, rating, reviewType) {
        document.getElementById('reviewId').value = id;
        document.getElementById('packageId').value = packageId;
        document.getElementById('comment').value = comment;
        document.getElementById('rating').value = rating;
        document.getElementById('reviewType').value = reviewType;
        document.getElementById('review-form').style.display = 'block';
        document.getElementById('toggle-review-form').style.display = 'none';
    }

    async function deleteReview(id) {
        if (confirm('Are you sure you want to delete this review?')) {
            try {
                const response = await fetch(`/api/reviews/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('Review deleted');
                    loadReviews();
                } else {
                    alert('Failed to delete review');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    }

    document.getElementById('toggle-review-form').addEventListener('click', () => {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            alert('Please login to submit a review');
            window.location.href = '/login.html';
            return;
        }
        document.getElementById('review-form').style.display = 'block';
        document.getElementById('toggle-review-form').style.display = 'none';
        document.getElementById('reviewId').value = '';
        document.getElementById('review-form').reset();
    });

    document.getElementById('review-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = JSON.parse(localStorage.getItem('user'));
        const review = {
            id: document.getElementById('reviewId').value || undefined,
            userId: user.id,
            packageId: document.getElementById('packageId').value,
            comment: document.getElementById('comment').value,
            rating: parseInt(document.getElementById('rating').value),
            reviewType: document.getElementById('reviewType').value
        };

        try {
            const url = review.id ? `/api/reviews/${review.id}` : '/api/reviews';
            const method = review.id ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(review)
            });
            if (response.ok) {
                alert(review.id ? 'Review updated' : 'Review submitted');
                document.getElementById('review-form').style.display = 'none';
                document.getElementById('toggle-review-form').style.display = 'block';
                loadReviews();
            } else {
                alert('Failed to submit review');
            }
        } catch (error) {
            alert('Error: ' + error.message);
        }
    });

    window.onload = () => {
        loadReviews();
        loadPackagesForReview();
    };
</script>
</body>
</html>
