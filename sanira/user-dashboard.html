<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Tourism Customization Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/packages.html">Packages</a></li>
            <li><a href="/reviews.html">Reviews</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>
</header>

<div class="section">
    <h2>User Dashboard</h2>

    <!-- Profile Section -->
    <h3>Profile</h3>
    <form id="profile-form">
        <input type="hidden" id="userId">
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="contact" placeholder="Contact" required>
        <input type="password" id="password" placeholder="New Password (optional)">
        <button type="submit">Update Profile</button>
    </form>

    <!-- Booking Section -->
    <h3>My Bookings</h3>
    <table>
        <thead>
        <tr>
            <th>Package</th>
            <th>Travel Date</th>
            <th>Travelers</th>
            <th>Type</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="bookings-table-body"></tbody>
    </table>
</div>

<!-- Edit Booking Modal -->
<div id="edit-modal" style="display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: white; padding: 20px; border: 1px solid #ccc;">
    <h3>Edit Booking</h3>
    <form id="edit-booking-form">
        <input type="hidden" id="edit-booking-id">
        <label>Travel Date: <input type="date" id="edit-travel-date" required></label><br>
        <label>Number of Travelers: <input type="number" id="edit-travelers" min="1" required></label><br>
        <label>Booking Type:
            <select id="edit-booking-type" required>
                <option value="INDIVIDUAL">Individual</option>
                <option value="GROUP">Group</option>
            </select>
        </label><br>
        <button type="submit" class="btn">Save</button>
        <button type="button" class="btn" onclick="closeEditModal()">Cancel</button>
    </form>
</div>

<footer>
    <p>© 2025 Tourism Customization Platform. All rights reserved.</p>
</footer>

<script>
    async function loadProfile() {
        console.log('Loading profile...');
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            alert('Please log in');
            window.location.href = '/login.html';
            return;
        }
        document.getElementById('userId').value = user.id || '';
        document.getElementById('username').value = user.username || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('contact').value = user.contact || '';
    }

    async function loadBookings() {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || !user.id) {
            alert('Please log in');
            window.location.href = '/login.html';
            return;
        }
        console.log('Fetching bookings for user ID:', user.id);
        try {
            // Fetch bookings
            const bookingResponse = await fetch(`/api/bookings?userId=${user.id}`);
            if (!bookingResponse.ok) {
                const errorText = await bookingResponse.text();
                console.error('Error fetching bookings:', bookingResponse.status, errorText);
                document.getElementById('bookings-table-body').innerHTML =
                    `<tr><td colspan="5">Error loading bookings: ${errorText} (Status: ${bookingResponse.status})</td></tr>`;
                return;
            }
            const bookings = await bookingResponse.json();
            console.log('Bookings:', bookings);

            // Fetch all packages
            const packageResponse = await fetch('/api/packages');
            if (!packageResponse.ok) {
                const errorText = await packageResponse.text();
                console.error('Error fetching packages:', packageResponse.status, errorText);
                document.getElementById('bookings-table-body').innerHTML =
                    `<tr><td colspan="5">Error loading packages: ${errorText} (Status: ${packageResponse.status})</td></tr>`;
                return;
            }
            const packages = await packageResponse.json();
            const packageMap = new Map(packages.map(pkg => [pkg.id, pkg.name]));
            console.log('Package map:', packageMap);

            const tbody = document.getElementById('bookings-table-body');
            tbody.innerHTML = '';
            if (bookings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">No bookings found</td></tr>';
                return;
            }
            bookings.forEach(booking => {
                const packageName = packageMap.get(booking.packageId) || 'Unknown Package';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                <td>${packageName}</td>
                <td>${booking.travelDate}</td>
                <td>${booking.travelers}</td> <!-- Fixed from numberOfTravelers -->
                <td>${booking.bookingType}</td>
                <td>
                    <button class="action-btn edit-btn" onclick="editBooking('${booking.id}', '${booking.travelDate}', ${booking.travelers}, '${booking.bookingType}', '${booking.packageId}', '${booking.userId}')">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteBooking('${booking.id}')">Delete</button>
                </td>
            `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error('Error loading bookings:', error);
            document.getElementById('bookings-table-body').innerHTML =
                `<tr><td colspan="5">Error loading bookings: ${error.message}</td></tr>`;
        }
    }
    function editBooking(bookingId, travelDate, numberOfTravelers, bookingType, packageId, userId) {
        document.getElementById('edit-booking-id').value = bookingId;
        document.getElementById('edit-travel-date').value = travelDate;
        document.getElementById('edit-travelers').value = numberOfTravelers;
        document.getElementById('edit-booking-type').value = bookingType;
        document.getElementById('edit-modal').dataset.packageId = packageId;
        document.getElementById('edit-modal').dataset.userId = userId;
        document.getElementById('edit-modal').style.display = 'block';
    }

    function closeEditModal() {
        document.getElementById('edit-modal').style.display = 'none';
        document.getElementById('edit-booking-form').reset();
    }

    document.getElementById('edit-booking-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            alert('Please log in');
            window.location.href = '/login.html';
            return;
        }
        const modal = document.getElementById('edit-modal');
        const booking = {
            id: document.getElementById('edit-booking-id').value,
            packageId: modal.dataset.packageId,
            userId: modal.dataset.userId,
            travelDate: document.getElementById('edit-travel-date').value,
            numberOfTravelers: parseInt(document.getElementById('edit-travelers').value),
            bookingType: document.getElementById('edit-booking-type').value
        };
        console.log('Updating booking:', booking);
        try {
            const response = await fetch(`/api/bookings/${booking.id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'User-Id': user.id
                },
                body: JSON.stringify(booking)
            });
            if (response.ok) {
                alert('Booking updated successfully');
                closeEditModal();
                await loadBookings();
            } else {
                const errorText = await response.text();
                console.error('Error updating booking:', response.status, errorText);
                alert(`Failed to update booking: ${errorText} (Status: ${response.status})`);
            }
        } catch (error) {
            console.error('Error updating booking:', error);
            alert('Error: ' + error.message);
        }
    });

    async function deleteBooking(bookingId) {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            alert('Please log in');
            window.location.href = '/login.html';
            return;
        }
        if (!confirm('Are you sure you want to delete this booking?')) return;
        try {
            const response = await fetch(`/api/bookings/${bookingId}`, {
                method: 'DELETE',
                headers: {
                    'User-Id': user.id
                }
            });
            if (response.ok) {
                alert('Booking deleted successfully');
                await loadBookings();
            } else {
                const errorText = await response.text();
                console.error('Error deleting booking:', response.status, errorText);
                alert(`Failed to delete booking: ${errorText} (Status: ${response.status})`);
            }
        } catch (error) {
            console.error('Error deleting booking:', error);
            alert('Error: ' + error.message);
        }
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            alert('Please log in');
            window.location.href = '/login.html';
            return;
        }
        const updatedUser = {
            id: document.getElementById('userId').value,
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            contact: document.getElementById('contact').value,
            password: document.getElementById('password').value || user.password,
            userType: user.userType
        };
        console.log('Updating user:', updatedUser);
        try {
            const response = await fetch(`/api/users/${updatedUser.id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'User-Id': user.id
                },
                body: JSON.stringify(updatedUser)
            });
            if (response.ok) {
                alert('Profile updated successfully');
                localStorage.setItem('user', JSON.stringify(updatedUser));
                await loadProfile();
            } else {
                const errorText = await response.text();
                console.error('Error updating profile:', response.status, errorText);
                alert(`Failed to update profile: ${errorText} (Status: ${response.status})`);
            }
        } catch (error) {
            console.error('Error updating profile:', error);
            alert('Error: ' + error.message);
        }
    });

    function logout() {
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    }

    async function initialize() {
        await loadProfile();
        await loadBookings();
    }

    window.onload = initialize;
</script>
</body>
</html>
