<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packages - Tourism Customization Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/login.html">Login</a></li>
            <li><a href="/register.html">Register</a></li>
            <li><a href="/reviews.html">Reviews</a></li>
        </ul>
    </nav>
</header>

<div class="section">
    <h2>Travel Packages</h2>
    <button class="btn" onclick="sortPackages()">Sort by Price</button>
    <div id="packages-container" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
</div>

<footer>
    <p>&copy; 2025 Tourism Customization Platform. All rights reserved.</p>
</footer>

<script>
    async function loadPackages(url = '/api/packages') {
        try {
            const response = await fetch(url);
            console.log('Response status:', response.status);
            if (!response.ok) {
                console.error('Fetch error:', response.status, response.statusText);
                return;
            }
            const packages = await response.json();
            console.log('Packages received:', packages);
            const container = document.getElementById('packages-container');
            container.innerHTML = '';
            if (packages.length === 0) {
                container.innerHTML = '<p>No packages available.</p>';
            }
            packages.forEach(pkg => {
                console.log('Rendering package:', pkg);
                const div = document.createElement('div');
                div.className = 'card';
                div.style.width = '300px';
                div.innerHTML = `
                <h3>${pkg.name}</h3>
                <p>Destination: ${pkg.destination}</p>
                <p>Price: $${pkg.price}</p>
                <p>Duration: ${pkg.duration} days</p>
                <p>Type: ${pkg.packageType}</p>
                <button class="btn" onclick="bookPackage('${pkg.id}')">Book Now</button>
            `;
                container.appendChild(div);
            });
        } catch (error) {
            console.error('Error loading packages:', error);
            document.getElementById('packages-container').innerHTML = '<p>Error loading packages.</p>';
        }
    }

    async function sortPackages() {
        loadPackages('/api/packages/sorted');
    }

    function bookPackage(packageId) {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            alert('Please login to book a package');
            window.location.href = '/login.html';
            return;
        }
        window.location.href = `/booking.html?packageId=${packageId}`;
    }

    window.onload = () => loadPackages();
</script>
</body>
</html>
