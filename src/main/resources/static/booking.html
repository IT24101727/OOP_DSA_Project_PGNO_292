<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Package - Tourism Customization Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header>
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/packages.html">Packages</a></li>
      <li><a href="/reviews.html">Reviews</a></li>
    </ul>
  </nav>
</header>

<div class="section">
  <h2>Book Your Trip</h2>
  <form id="booking-form">
    <input type="hidden" id="packageId">
    <input type="date" id="travelDate" required>
    <input type="number" id="travelers" placeholder="Number of Travelers" min="1" required>
    <select id="bookingType" required>
      <option value="INDIVIDUAL">Individual</option>
      <option value="GROUP">Group</option>
    </select>
    <button type="submit">Confirm Booking</button>
  </form>
</div>

<footer>
  <p>© 2025 Tourism Customization Platform. All rights reserved.</p>
</footer>

<script>
  // Initialize packageId from URL query parameter
  function initBookingForm() {
    const urlParams = new URLSearchParams(window.location.search);
    const packageId = urlParams.get('packageId');
    if (packageId) {
      document.getElementById('packageId').value = packageId;
    } else {
      alert('No package selected');
      window.location.href = '/packages.html';
    }
  }

  document.getElementById('booking-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) {
      alert('Please login to book');
      window.location.href = '/login.html';
      return;
    }

    const booking = {
      userId: user.id,
      packageId: document.getElementById('packageId').value,
      travelDate: document.getElementById('travelDate').value,
      travelers: parseInt(document.getElementById('travelers').value),
      bookingType: document.getElementById('bookingType').value
    };

    try {
      const response = await fetch('/api/bookings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(booking)
      });
      if (response.ok) {
        alert('Booking confirmed!');
        window.location.href = '/user-dashboard.html';
      } else {
        alert('Booking failed');
      }
    } catch (error) {
      alert('Error: ' + error.message);
    }
  });

  window.onload = initBookingForm;
</script>
</body>
</html>
